<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Vision | Retail CRM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 0; margin: 0; color: #333; }
        .header { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #f1c40f; margin-bottom: 10px;}
        .search-container { display: flex; gap: 8px; flex: 1; max-width: 400px; min-width: 280px;}
        .search-container input { flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 14px; outline: none; }
        .search-container button { background: #f1c40f; color: #000; font-weight: bold; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .search-container button:hover { background: #d4ac0d; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .tab-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: -1px; }
        .tab-btn { background: #ddd; border: none; padding: 12px 15px; font-weight: bold; border-radius: 6px 6px 0 0; cursor: pointer; color: #555; transition: 0.2s; font-size:14px;}
        .tab-btn.active { background: #fff; color: #000; border-bottom: 3px solid #f1c40f; }
        
        .btn-sale { background: #28a745 !important; color: white !important; border-radius: 6px !important; margin-left: auto;}
        .btn-comp { background: #e74c3c !important; color: white !important; border-radius: 6px !important;}

        .dashboard-area { background: white; padding: 20px; border-radius: 0 8px 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card { border: 1px solid #eee; border-left: 5px solid #e74c3c; border-radius: 6px; padding: 15px; margin-bottom: 15px; background: #fffaf9;}
        .card.Pending { border-left-color: #e74c3c; background: #fffaf9;}
        .card.Contacted { border-left-color: #f39c12; background: #fffdf7;}
        .card.Resolved { border-left-color: #27ae60; background: #f9fff9;}
        .card-header { display: flex; justify-content: space-between; font-size: 12px; color: #888; font-weight: bold; margin-bottom: 8px;}
        .btn-update { margin-top:10px; background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;}
        .complaint-badge { background: #ffebee; color: #c62828; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; border: 1px solid #ffcdd2; display: inline-block; margin-bottom: 5px;}
        
        .profile-area { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .profile-header { background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #eee;}
        .profile-name { font-size: 24px; font-weight: bold; margin: 0 0 5px 0; color: #1a1a1a;}
        .profile-tags { display: flex; gap: 10px; margin-top: 10px; font-size: 13px; }
        .tag { background: #e3f2fd; color: #0056b3; padding: 4px 10px; border-radius: 12px; font-weight: bold; }
        .history-list { border-left: 2px solid #ccc; margin-left: 10px; padding-left: 15px; }
        .history-item { margin-bottom: 15px; position: relative; }
        .history-item::before { content: ''; position: absolute; left: -21px; top: 5px; width: 10px; height: 10px; background: #ccc; border-radius: 50%; }
        .staff-notes { background:#e9ecef; padding:10px; border-radius:6px; margin-top:10px; font-size:13px; white-space: pre-wrap; font-family: monospace;}
        .sale-badge { background: #e8f5e9; color: #2e7d32; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 5px; display: inline-block; border: 1px solid #c8e6c9;}

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto;}
        .modal-content { background: white; max-width: 500px; margin: 40px auto; padding: 25px; border-radius: 12px; position: relative;}
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #888; }
        
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 13px; color: #444;}
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: sans-serif;}
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }
        .submit-btn { background: #1a1a1a; color: #f1c40f; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px; margin-top: 25px; cursor: pointer; transition: 0.3s;}
        
        #productSelectorDiv { background: #e8f4f8; padding: 15px; border-radius: 8px; border: 1px solid #b3e5fc; margin-bottom: 15px; display: none; }
        #saleDetailsDiv { background: #f1f8e9; padding: 15px; border-radius: 8px; border: 1px solid #c5e1a5; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">AUDIO VISION</div>
        <div class="search-container">
            <input type="tel" id="searchInput" placeholder="Search Phone Number..." maxlength="10">
            <button id="searchBtn" onclick="searchCustomer()">SEARCH</button>
        </div>
    </div>

    <div class="container">
        <div class="tab-container">
            <button class="tab-btn active" id="tabActive" onclick="showView('dashboard')">Active Complaints</button>
            <button class="tab-btn" id="tabProfile" style="display:none;" onclick="showView('profile')">Customer Profile</button>
            
            <button class="tab-btn btn-sale" onclick="openForm('Sale')">🛒 Add Sale</button>
            <button class="tab-btn btn-comp" onclick="openForm('Complaint')">⚠️ Add Complaint</button>
        </div>

        <div id="dashboardView" class="dashboard-area">
            <h3 style="margin-top:0;">Action Required Today <button onclick="loadActiveBoard()" style="float:right; cursor:pointer; padding:5px 10px; border-radius:4px; border:1px solid #ccc;">🔄 Refresh</button></h3>
            <div id="activeList">
                <div class="empty-msg">Loading active jobs...</div>
            </div>
        </div>

        <div id="profileView" class="profile-area">
            <div class="profile-header">
                <h2 class="profile-name" id="profName">Loading...</h2>
                <div style="color: #666; font-size: 14px;" id="profContact"></div>
                <div class="profile-tags">
                    <div class="tag">🛍️ Total Purchases: <span id="profPurchases">0</span></div>
                    <div class="tag" style="background:#ffebee; color:#c62828;">🔧 Total Complaints: <span id="profComplaints">0</span></div>
                </div>
            </div>

            <h3>Service & Purchase History</h3>
            <div class="history-list" id="historyList">
                <i style="color:#888; font-size:14px;">Customer history will appear here.</i>
            </div>
        </div>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeForm()">&times;</span>
            <h2 id="formTitle" style="margin-top:0; color:#1a1a1a;">Log Record</h2>
            
            <form id="recordForm">
                <input type="hidden" name="formMode" id="formModeInput">
                
                <div id="productSelectorDiv">
                    <label style="margin-top:0; color:#0277bd;">Did they purchase this from us before?</label>
                    <select id="pastProductSelect" onchange="autoFillProduct()">
                        <option value="NEW">--- Not recorded on portal but file complaint ---</option>
                    </select>
                </div>

                <label>Customer Name *</label>
                <input type="text" name="cName" id="fName" required>
                
                <div class="flex-row">
                    <div><label>Primary Phone *</label><input type="tel" name="cPhone1" id="fPhone1" required></div>
                    <div><label>Secondary Phone</label><input type="tel" name="cPhone2" id="fPhone2"></div>
                </div>

                <label>Email Address</label>
                <input type="email" name="cEmail" id="fEmail">
                
                <label>Full Address *</label>
                <textarea name="cAddress" id="fAddress" rows="2" required></textarea>
                
                <div class="flex-row">
                    <div><label>Area *</label><input type="text" name="cArea" id="fArea" required></div>
                    <div><label>Pincode *</label><input type="text" name="cPincode" id="fPincode" required></div>
                </div>

                <div style="border-top: 2px dashed #ccc; margin: 20px 0;"></div>

                <div id="saleDetailsDiv">
                    <h4 style="margin:0 0 10px 0; color:#33691e;">Billing Details</h4>
                    <div class="flex-row">
                        <div><label style="margin-top:0;">Price (₹) *</label><input type="number" name="cPrice" id="fPrice"></div>
                        <div>
                            <label style="margin-top:0;">Payment Mode *</label>
                            <select name="cPayment" id="fPayment" onchange="handlePaymentChange()">
                                <option value="" disabled selected>Select...</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="UPI">UPI / Scan</option>
                                <option value="Finance/EMI">Finance / EMI</option>
                                <option value="Bajaj Finance">Bajaj Finance</option>
                                <option value="Cheque">Cheque</option>
                                <option value="Reference">Reference</option>
                                <option value="Payment Due">Payment Due</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div id="emiDetailsDiv" style="display:none; margin-top:10px;" class="flex-row">
                        <div><label style="margin-top:0; color:#e65100;">EMI Months</label><input type="number" id="fEmiMonths" placeholder="e.g. 6"></div>
                        <div><label style="margin-top:0; color:#e65100;">EMI Amount (₹)</label><input type="number" id="fEmiCost" placeholder="e.g. 2500"></div>
                    </div>

                    <div id="dueDetailsDiv" style="display:none; margin-top:10px;">
                        <label style="margin-top:0; color:#c62828;">Pending Amount Due (₹)</label>
                        <input type="number" id="fDueAmount" placeholder="e.g. 5000">
                    </div>

                    <div id="paymentOtherDiv" style="display:none; margin-top:10px;">
                        <label style="margin-top:0; color:#0277bd;">Specify Payment Method *</label>
                        <input type="text" id="fPaymentOther" placeholder="e.g. Exchange, Gift Card...">
                    </div>

                    <div class="flex-row">
                        <div><label>Receipt No.</label><input type="text" name="cReceipt" id="fReceipt"></div>
                        <div><label>Challan No.</label><input type="text" name="cChallan" id="fChallan"></div>
                    </div>
                </div>

                <div class="flex-row">
                    <div><label>Purchase/Log Date *</label><input type="date" name="pDate" id="fDate" required></div>
                    <div>
                        <label>Brand *</label>
                        <select name="cBrand" id="brandSelect" onchange="toggleCustomBrand()" required>
                            <option value="" disabled selected>Select Brand</option>
                            <option value="LG">LG</option>
                            <option value="Mitsubishi">Mitsubishi</option>
                            <option value="VU">VU</option>
                            <option value="Voltas">Voltas</option>
                            <option value="Hitachi">Hitachi</option>
                            <option value="Panasonic">Panasonic</option>
                            <option value="Godrej">Godrej</option>
                            <option value="Samsung">Samsung</option>
                            <option value="Other">Other (Specify)</option>
                        </select>
                    </div>
                </div>

                <input type="text" name="customBrand" id="customBrand" placeholder="Type Brand Name..." style="display:none; margin-top:5px;">

                <label>Model Number *</label>
                <input type="text" name="cModel" id="fModel" required>

                <div id="complaintOnlySection">
                    <label id="problemLabel">Problem / Issue *</label>
                    <textarea name="cProblem" id="fProblem" rows="3" placeholder="Describe the issue..."></textarea>

                    <div id="statusSection">
                        <label>Current Status *</label>
                        <select name="cStatus" id="fStatus" onchange="handleStatusChange()">
                            </select>
                        
                        <div id="statusOtherDiv" style="display:none; margin-top:10px;">
                            <input type="text" id="fStatusOther" placeholder="Type custom status here...">
                        </div>
                    </div>
                </div>

                <button type="submit" id="subBtn" class="submit-btn">SAVE RECORD</button>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ YOUR SPECIFIC GOOGLE APPS SCRIPT URL ⚠️
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwxjAELcQkLo3oeLGc86t20OE5Q7n85ifu7htNI8NLovU78AcH6EjGp4331vdWswXqw/exec';

        let currentCustomerProducts = [];

        window.onload = () => { loadActiveBoard(); };

        function showView(view) {
            if (view === 'dashboard') {
                document.getElementById('dashboardView').style.display = 'block';
                document.getElementById('profileView').style.display = 'none';
                document.getElementById('tabActive').classList.add('active');
                document.getElementById('tabProfile').classList.remove('active');
            } else if (view === 'profile') {
                document.getElementById('dashboardView').style.display = 'none';
                document.getElementById('profileView').style.display = 'block';
                document.getElementById('tabProfile').style.display = 'inline-block';
                document.getElementById('tabProfile').classList.add('active');
                document.getElementById('tabActive').classList.remove('active');
            }
        }

        async function loadActiveBoard() {
            const listDiv = document.getElementById('activeList');
            listDiv.innerHTML = "<i>Loading active complaints...</i>";
            try {
                const resp = await fetch(scriptURL + "?action=readActive");
                const data = await resp.json();
                listDiv.innerHTML = "";
                
                if(data.length === 0) {
                    listDiv.innerHTML = '<div class="empty-msg">All caught up! No active complaints right now.</div>';
                    return;
                }

                data.forEach(item => {
                    const dateStr = new Date(item.date).toLocaleDateString();
                    // Any status that isn't 'Working Fine' or 'Resolved' gets the red Pending class
                    let statusClass = (item.status.includes("Pending") || item.status.includes("Out for Delivery")) ? "Pending" : "Contacted";
                    
                    listDiv.innerHTML += `
                    <div class="card ${statusClass}">
                        <div class="card-header"><span>📅 Logged: ${dateStr}</span> <span style="text-transform:uppercase;">${item.status}</span></div>
                        ${item.complaintNo ? `<div class="complaint-badge">🎫 ID: ${item.complaintNo}</div>` : ''}
                        <h3 style="margin:5px 0;">${item.name}</h3>
                        <div style="font-size:13px; color:#555;">📞 ${item.phone1} | 📍 ${item.area}</div>
                        <div style="background:rgba(0,0,0,0.03); padding:8px; border-radius:4px; margin-top:10px; font-size:14px;">
                            <strong>${item.brand}</strong> (Model: ${item.model})<br>
                            Issue: ${item.problem}
                        </div>
                        ${item.notes ? `<div class="staff-notes"><b>Staff Notes:</b><br>${item.notes}</div>` : ''}
                        <button class="btn-update" onclick="updateStatus('${item.row}', '${item.status}')">Update Status / Add Note</button>
                    </div>`;
                });
            } catch (err) {
                listDiv.innerHTML = "Error loading active board.";
            }
        }

        async function searchCustomer() {
            const phone = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('searchBtn');
            if(phone.length < 5) { alert("Please enter a valid phone number."); return; }
            
            btn.innerText = "SEARCHING...";
            btn.disabled = true;
            currentCustomerProducts = []; 

            try {
                const resp = await fetch(scriptURL + "?action=search&phone=" + encodeURIComponent(phone));
                const data = await resp.json();
                
                showView('profile');
                const historyDiv = document.getElementById('historyList');
                
                if(data.length === 0) {
                    document.getElementById('profName').innerText = "New Customer";
                    document.getElementById('profContact').innerText = `Phone: ${phone} (No records found)`;
                    document.getElementById('profPurchases').innerText = "0";
                    document.getElementById('profComplaints').innerText = "0";
                    historyDiv.innerHTML = "<i>No previous history. Click Add Sale or Add Complaint to begin.</i>";
                    
                    window.lastSearchedPhone = phone; 
                } else {
                    const latest = data[0];
                    document.getElementById('profName').innerText = latest.name;
                    document.getElementById('profContact').innerText = `📞 ${latest.phone1} ${latest.phone2 ? '/ ' + latest.phone2 : ''} | ✉️ ${latest.email || 'N/A'} | 📍 ${latest.area}`;
                    
                    let saleCount = data.filter(d => d.status.includes("Working Fine") || d.status.includes("Out for Delivery")).length;
                    document.getElementById('profPurchases').innerText = saleCount;
                    let complaintCount = data.length - saleCount;
                    document.getElementById('profComplaints').innerText = complaintCount;

                    let uniqueTracker = new Set();
                    data.forEach(item => {
                        let prodKey = item.brand + "-" + item.model;
                        if (!uniqueTracker.has(prodKey) && item.brand && item.model) {
                            uniqueTracker.add(prodKey);
                            currentCustomerProducts.push(item);
                        }
                    });
                    
                    window.latestCustData = latest;

                    historyDiv.innerHTML = "";
                    data.forEach(item => {
                        const isComplaint = !(item.status.includes("Working Fine") || item.status.includes("Out for Delivery"));
                        const titleColor = isComplaint ? "#e74c3c" : "#28a745";
                        const titleText = isComplaint ? `⚠️ Complaint: ${item.brand} ${item.model}` : `🛒 Purchase: ${item.brand} ${item.model}`;
                        const badgeHtml = item.complaintNo ? `<span class="complaint-badge" style="float:right;">ID: ${item.complaintNo}</span>` : '';
                        
                        let billingHtml = "";
                        if(!isComplaint && item.price) {
                            billingHtml = `<div class="sale-badge">₹${item.price} | Paid via ${item.payment} ${item.receipt ? '| Receipt: '+item.receipt : ''} ${item.challan ? '| Challan: '+item.challan : ''}</div><br>`;
                        }

                        historyDiv.innerHTML += `
                        <div class="history-item">
                            ${badgeHtml}
                            <div style="font-size:12px; color:#888; font-weight:bold;">${new Date(item.date).toLocaleDateString()}</div>
                            <strong style="color:${titleColor}; font-size:16px;">${titleText}</strong><br>
                            ${billingHtml}
                            ${isComplaint ? `<span style="font-size:13px; color:#444;"><b>Issue:</b> ${item.problem}</span><br>` : ''}
                            <span style="font-size:13px; color:#555;"><b>Status:</b> ${item.status}</span>
                            ${item.notes ? `<div class="staff-notes">${item.notes}</div>` : ''}
                        </div>`;
                    });
                }
            } catch (err) {
                alert("Error searching database.");
            }
            btn.innerText = "SEARCH";
            btn.disabled = false;
        }

        function autoFillProduct() {
            const selectVal = document.getElementById('pastProductSelect').value;
            if (selectVal === "NEW") {
                document.getElementById('brandSelect').value = "";
                document.getElementById('fModel').value = "";
                document.getElementById('fDate').value = "";
                toggleCustomBrand();
            } else {
                const item = currentCustomerProducts[selectVal];
                const brandDrop = document.getElementById('brandSelect');
                let foundBrand = false;
                for(let i=0; i<brandDrop.options.length; i++) {
                    if(brandDrop.options[i].value.toUpperCase() === item.brand.toUpperCase()) {
                        brandDrop.selectedIndex = i;
                        foundBrand = true;
                        break;
                    }
                }
                if(!foundBrand) {
                    brandDrop.value = "Other";
                    document.getElementById('customBrand').value = item.brand;
                }
                toggleCustomBrand();

                document.getElementById('fModel').value = item.model;
                if(item.purchaseDate) {
                    let d = new Date(item.purchaseDate);
                    document.getElementById('fDate').value = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
                }
            }
        }

        // Toggles the extra payment fields based on what staff selects
        function handlePaymentChange() {
            const payVal = document.getElementById('fPayment').value;
            const emiDiv = document.getElementById('emiDetailsDiv');
            const dueDiv = document.getElementById('dueDetailsDiv');
            const otherDiv = document.getElementById('paymentOtherDiv');
            
            emiDiv.style.display = 'none';
            dueDiv.style.display = 'none';
            otherDiv.style.display = 'none';
            document.getElementById('fPaymentOther').required = false;

            if (payVal === 'Finance/EMI' || payVal === 'Bajaj Finance') {
                emiDiv.style.display = 'flex';
            } else if (payVal === 'Payment Due') {
                dueDiv.style.display = 'block';
            } else if (payVal === 'Other') {
                otherDiv.style.display = 'block';
                document.getElementById('fPaymentOther').required = true;
            }
        }

        // Toggles the custom status box
        function handleStatusChange() {
            const statVal = document.getElementById('fStatus').value;
            const otherDiv = document.getElementById('statusOtherDiv');
            
            if (statVal === 'Other') {
                otherDiv.style.display = 'block';
                document.getElementById('fStatusOther').required = true;
            } else {
                otherDiv.style.display = 'none';
                document.getElementById('fStatusOther').required = false;
            }
        }

        const form = document.getElementById('recordForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "Saving to Database...";
            btn.disabled = true;

            const formData = new FormData(form);
            
            // SMART INTERCEPT: Combine Payment Details
            const basePayment = formData.get('cPayment');
            if (basePayment === 'Finance/EMI' || basePayment === 'Bajaj Finance') {
                const months = document.getElementById('fEmiMonths').value;
                const cost = document.getElementById('fEmiCost').value;
                if (months || cost) {
                    formData.set('cPayment', `${basePayment} (${months || '?'} Months @ ₹${cost || '?'})`);
                }
            } else if (basePayment === 'Payment Due') {
                const dueAmt = document.getElementById('fDueAmount').value;
                if (dueAmt) {
                    formData.set('cPayment', `Payment Due (Pending: ₹${dueAmt})`);
                }
            } else if (basePayment === 'Other') {
                const otherPay = document.getElementById('fPaymentOther').value;
                if (otherPay) {
                    formData.set('cPayment', otherPay);
                }
            }

            // SMART INTERCEPT: Custom Status
            const baseStatus = formData.get('cStatus');
            if (baseStatus === 'Other') {
                const otherStat = document.getElementById('fStatusOther').value;
                if (otherStat) {
                    formData.set('cStatus', otherStat);
                }
            }

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => { 
                if (data.result === "Duplicate") {
                    alert("⚠️ DUPLICATE DETECTED\n\nThis exact complaint was logged in the last 24 hours.");
                } else {
                    alert("Record Saved Successfully!");
                    closeForm();
                    const phoneSearched = document.getElementById('searchInput').value.trim();
                    if(document.getElementById('tabProfile').classList.contains('active') && phoneSearched) {
                        searchCustomer(); 
                    } else {
                        loadActiveBoard(); 
                    }
                }
                btn.innerText = "SAVE RECORD";
                btn.disabled = false;
            })
            .catch(error => {
                alert("Error connecting to database.");
                btn.innerText = "SAVE RECORD";
                btn.disabled = false;
            });
        });

        async function updateStatus(row, currentStatus) {
            let statusOptions = "Type exactly one of the following:\n1. Pending Brand Call\n2. Brand Contacted\n3. Resolved\n4. Or type your own custom status";
            let newStatus = prompt(statusOptions, currentStatus);
            if (!newStatus || newStatus.trim() === "") return;

            let newNote = prompt("Add an update note (e.g., 'Ticket #12345' or 'Tech coming tomorrow'):\nLeave blank if no new notes.");
            if (newNote === null) return; 
            
            try {
                const url = `${scriptURL}?action=updateStatus&row=${row}&status=${encodeURIComponent(newStatus.trim())}&notes=${encodeURIComponent(newNote.trim())}`;
                await fetch(url);
                alert("Updated successfully!");
                loadActiveBoard(); 
            } catch (err) {
                alert("Failed to update status.");
            }
        }

        function openForm(mode) { 
            document.getElementById('formModal').style.display = 'block'; 
            document.getElementById('recordForm').reset();
            
            // Hide custom conditional fields on reset
            document.getElementById('emiDetailsDiv').style.display = 'none';
            document.getElementById('dueDetailsDiv').style.display = 'none';
            document.getElementById('paymentOtherDiv').style.display = 'none';
            document.getElementById('statusOtherDiv').style.display = 'none';
            
            document.getElementById('formModeInput').value = mode;
            document.getElementById('formTitle').innerText = mode === "Sale" ? "🛒 Log New Sale" : "⚠️ Log New Complaint";
            
            const saleDiv = document.getElementById('saleDetailsDiv');
            const probLabel = document.getElementById('problemLabel');
            const fProblem = document.getElementById('fProblem');
            const statusSec = document.getElementById('statusSection');
            const fStatus = document.getElementById('fStatus');
            const productDiv = document.getElementById('productSelectorDiv');
            
            if (window.latestCustData) {
                const l = window.latestCustData;
                document.getElementById('fName').value = l.name;
                document.getElementById('fPhone1').value = l.phone1;
                document.getElementById('fPhone2').value = l.phone2.replace(/'/g, ''); 
                document.getElementById('fEmail').value = l.email;
                document.getElementById('fAddress').value = l.address;
                document.getElementById('fArea').value = l.area;
                document.getElementById('fPincode').value = l.pincode;
            } else if (window.lastSearchedPhone) {
                document.getElementById('fPhone1').value = window.lastSearchedPhone;
            }

            if (mode === "Sale") {
                saleDiv.style.display = 'block';
                document.getElementById('fPrice').required = true;
                document.getElementById('fPayment').required = true;
                
                productDiv.style.display = 'none'; 
                probLabel.innerText = "Internal Notes (Optional)";
                fProblem.required = false;
                
                // Show Sale specific status options
                statusSec.style.display = 'block';
                fStatus.innerHTML = `
                    <option value="Working Fine (Delivered)">Sale Logged (Delivered / Handed Over)</option>
                    <option value="Purchase Registered - Out for Delivery">Purchase Registered - Out for Delivery</option>
                    <option value="Other">Other (Specify)</option>
                `;
                
                let today = new Date();
                document.getElementById('fDate').value = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,'0') + "-" + String(today.getDate()).padStart(2,'0');

            } else {
                saleDiv.style.display = 'none';
                document.getElementById('fPrice').required = false;
                document.getElementById('fPayment').required = false;
                
                probLabel.innerText = "Problem / Issue *";
                fProblem.required = true;
                
                // Show clean status dropdown for Complaints
                statusSec.style.display = 'block';
                fStatus.innerHTML = `
                    <option value="Pending Brand Call">Pending Brand Call (Needs Action)</option>
                    <option value="Brand Contacted">Brand Contacted (Waiting for Tech)</option>
                    <option value="Other">Other (Specify)</option>
                `;

                if (currentCustomerProducts.length > 0) {
                    productDiv.style.display = 'block';
                    const productSelect = document.getElementById('pastProductSelect');
                    productSelect.innerHTML = '<option value="NEW">--- Not recorded on portal but file complaint ---</option>';
                    currentCustomerProducts.forEach((item, index) => {
                        let d = item.purchaseDate ? new Date(item.purchaseDate).toLocaleDateString() : 'Unknown Date';
                        productSelect.innerHTML += `<option value="${index}">${item.brand} ${item.model} (Bought: ${d})</option>`;
                    });
                    productSelect.value = "NEW";
                } else {
                    productDiv.style.display = 'none';
                }
            }
        }
        
        function closeForm() { document.getElementById('formModal').style.display = 'none'; }
        
        function toggleCustomBrand() {
            const select = document.getElementById('brandSelect');
            const customInput = document.getElementById('customBrand');
            if (select.value === 'Other') {
                customInput.style.display = 'block';
                customInput.required = true;
            } else {
                customInput.style.display = 'none';
                customInput.required = false;
            }
        }
    </script>
</body>
</html>
