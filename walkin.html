<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk-In Lead Tracker | Locked</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 0; margin: 0; color: #333; }
        
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #004d40; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 35px 30px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box h2 { margin-top: 0; color: #004d40; letter-spacing: 1px;}
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s;}
        .login-box button { background: #00bfa5; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px;}
        #loginError { color: #d32f2f; font-size: 13px; font-weight: bold; display: none; margin-top: 15px; background: #ffebee; padding: 8px; border-radius: 4px;}

        .header { background: #004d40; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #fff;}
        .logo span { font-size: 14px; color: #a7ffeb; font-weight: normal; margin-left: 5px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .form-area { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid #00bfa5;}
        .form-area h3 { margin-top: 0; color: #004d40; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 13px; color: #555;}
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { background: #00bfa5; color: white; padding: 12px; border: none; width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px; margin-top: 20px; cursor: pointer;}
        
        .tab-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        .tab-btn { background: #ddd; border: none; padding: 10px 18px; font-weight: bold; border-radius: 20px; cursor: pointer; color: #555; font-size:14px; transition: 0.2s;}
        .tab-btn.active { background: #004d40; color: white; }

        .lead-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid #00bfa5; position: relative;}
        .lead-card.alarm { border-left-color: #d32f2f; background: #fff5f5; }
        .card-header { display: flex; justify-content: space-between; font-size: 12px; color: #888; font-weight: bold; border-bottom: 1px dashed #eee; padding-bottom: 8px; margin-bottom: 8px;}
        .days-badge { background: #e0f2f1; color: #00695c; padding: 3px 8px; border-radius: 12px; font-size: 11px;}
        .alarm-badge { background: #d32f2f; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; animation: blinker 2s linear infinite;}
        .salesman-badge { background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 10px; border: 1px solid #ffe0b2;}
        @keyframes blinker { 50% { opacity: 0.5; } }
        
        .update-item { background: #e8f5e9; padding: 6px 10px; border-radius: 4px; font-size: 13px; color: #2e7d32; margin-top: 6px; border-left: 3px solid #4caf50;}
        
        .btn-close { background: #455a64; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 15px;}
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; position: relative;}
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #888; }
        .action-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; color: white; }
        .btn-bought { background: #28a745; }
        .btn-lost { background: #d32f2f; }
        .btn-other { background: #f39c12; }
        .btn-update-note { background: #004d40; padding: 10px; margin-top: 8px;}
        .empty-msg { text-align: center; color: #888; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>AUDIO VISION</h2>
            <p style="font-size:13px; color:#666; margin-top:-10px; margin-bottom:20px;">Staff Portal Authentication</p>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="checkLogin()">SECURE LOGIN</button>
            <div id="loginError">⚠️ Incorrect Username or Password</div>
        </div>
    </div>

    <div id="closeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="hideCloseModal()">&times;</span>
            <h3 id="modalLeadName" style="margin-top:0; color:#1a1a1a;">Update Lead</h3>
            
            <div style="background:#f4f9f9; padding:15px; border-radius:8px; border:1px solid #b2dfdb; margin-bottom:20px;">
                <label style="margin-top:0; color:#00695c;">Add an Update (Keeps Lead Open)</label>
                <textarea id="newLeadNote" rows="2" placeholder="e.g. Called them, they asked for 2 more days..."></textarea>
                <button class="action-btn btn-update-note" onclick="submitNote()">💾 Save Note & Keep Open</button>
            </div>

            <div style="border-top:2px dashed #ddd; padding-top:20px; text-align:center;">
                <p style="font-size:13px; color:#666; margin-bottom:10px; margin-top:0;">Or, what is the final status to close this lead?</p>
                <button class="action-btn btn-bought" onclick="submitCloseLead('Bought')">✅ BOUGHT (Closed Won)</button>
                <button class="action-btn btn-lost" onclick="submitCloseLead('Closed - Did Not Buy')">❌ DIDN'T BUY (Lost)</button>
                <button class="action-btn btn-other" onclick="submitCloseLead('OTHER')">📝 OTHER (Custom Reason)</button>
            </div>
            
            <form id="actionForm" target="hiddenFrame" method="POST" action="https://script.google.com/macros/s/AKfycbzb0PYWQdDywPfIZSiUDft1SGtbBKzpz0nsDvcgpg0wwJKUDPfFnTQLxFx5xoYq9TWn/exec" style="display:none;">
                <input type="hidden" name="action" id="actionField">
                <input type="hidden" name="row" id="rowField">
                <input type="hidden" name="note" id="noteField">
                <input type="hidden" name="result" id="resultField">
            </form>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="header">
            <div class="logo">AUDIO VISION <span>| Walk-In Tracker</span></div>
            <button onclick="location.href='index.html'" style="background:white; color:#004d40; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">⬅ Back to CRM</button>
        </div>

        <div class="container">
            <div class="form-area">
                <h3>Log New Walk-In Customer</h3>
                <form id="walkinForm" target="hiddenFrame" method="POST" action="https://script.google.com/macros/s/AKfycbzb0PYWQdDywPfIZSiUDft1SGtbBKzpz0nsDvcgpg0wwJKUDPfFnTQLxFx5xoYq9TWn/exec" onsubmit="handleFormSubmit()">
                    <div class="flex-row">
                        <div><label>Customer Name *</label><input type="text" name="wName" required></div>
                        <div><label>Phone Number</label><input type="tel" name="wPhone" maxlength="10"></div>
                    </div>
                    <div class="flex-row">
                        <div><label>Salesperson Name *</label><input type="text" name="wSalesman" placeholder="e.g. Ajay" required></div>
                        <div><label>Looking For (Brand/Product) *</label><input type="text" name="wBrand" placeholder="e.g. 55 inch LG TV" required></div>
                    </div>
                    <label>Remind me to follow up on:</label>
                    <input type="date" name="wFollowUp">
                    <label>Customer Notes / Quotes given</label>
                    <textarea name="wNotes" rows="2" placeholder="e.g. Quoted ₹45,000. Said he will discuss with wife and come back." required></textarea>
                    <button type="submit" id="subBtn" class="submit-btn">+ SAVE LEAD</button>
                </form>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0;">Dashboard (Active & Completed) <button onclick="loadWalkins()" style="font-size:12px; cursor:pointer; margin-left:10px;">🔄 Refresh</button></h3>
            </div>
            
            <div class="tab-container" id="salesmanTabs"></div>
            
            <div id="walkinList">
                <div class="empty-msg">Loading leads...</div>
            </div>
        </div>
    </div>

    <iframe name="hiddenFrame" id="hiddenFrame" style="display:none;"></iframe>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzb0PYWQdDywPfIZSiUDft1SGtbBKzpz0nsDvcgpg0wwJKUDPfFnTQLxFx5xoYq9TWn/exec';

        let allLeads = [];
        let currentActiveTab = "All";
        let targetRowToClose = null;

        window.onload = () => { 
            if(sessionStorage.getItem('avAuthWalkin') === 'true') unlockApp();
        };

        function checkLogin() {
            if (document.getElementById('loginUser').value === 'admin' && document.getElementById('loginPass').value === 'av123') {
                sessionStorage.setItem('avAuthWalkin', 'true');
                unlockApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function unlockApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadWalkins(); 
        }

        function handleFormSubmit() {
            const btn = document.getElementById('subBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('walkinForm').reset();
                btn.innerText = "+ SAVE LEAD";
                btn.disabled = false;
                loadWalkins();
            }, 1500); 
        }

        async function loadWalkins() {
            const listDiv = document.getElementById('walkinList');
            try {
                const resp = await fetch(scriptURL + "?action=getWalkins");
                const data = await resp.json();
                
                if(data.length === 0) {
                    allLeads = [];
                    listDiv.innerHTML = '<div class="empty-msg">No leads found in database.</div>';
                    document.getElementById('salesmanTabs').innerHTML = "";
                    return;
                }

                // SMART SORT: Active Leads top (by date), Completed Leads bottom
                allLeads = data.sort((a, b) => {
                    let aActive = a.status === "Active Lead" ? 0 : 1;
                    let bActive = b.status === "Active Lead" ? 0 : 1;
                    
                    if (aActive !== bActive) return aActive - bActive; 

                    if (!a.followUp && !b.followUp) return 0;
                    if (!a.followUp) return 1; 
                    if (!b.followUp) return -1; 
                    return new Date(a.followUp) - new Date(b.followUp);
                });

                renderDashboard();
            } catch (err) {
                listDiv.innerHTML = "Error loading leads.";
            }
        }

        function renderDashboard() {
            let salesmen = [...new Set(allLeads.map(item => item.salesman))];
            const tabDiv = document.getElementById('salesmanTabs');
            
            let tabsHtml = `<button class="tab-btn ${currentActiveTab === 'All' ? 'active' : ''}" onclick="switchTab('All')">All Leads</button>`;
            salesmen.forEach(name => {
                let safeName = name || "Unassigned";
                tabsHtml += `<button class="tab-btn ${currentActiveTab === safeName ? 'active' : ''}" onclick="switchTab('${safeName}')">${safeName}</button>`;
            });
            tabDiv.innerHTML = tabsHtml;

            let filteredLeads = allLeads;
            if (currentActiveTab !== "All") {
                filteredLeads = allLeads.filter(item => (item.salesman || "Unassigned") === currentActiveTab);
            }

            const listDiv = document.getElementById('walkinList');
            listDiv.innerHTML = "";
            const today = new Date();
            today.setHours(0,0,0,0); 

            if(filteredLeads.length === 0) {
                listDiv.innerHTML = `<div class="empty-msg">No leads for ${currentActiveTab}.</div>`;
                return;
            }

            filteredLeads.forEach(item => {
                const walkInDate = new Date(item.date);
                const diffDays = Math.floor(Math.abs(today - walkInDate) / (1000 * 60 * 60 * 24));
                let daysText = diffDays === 0 ? "Walked in Today" : `Walked in ${diffDays} days ago`;

                let isActive = item.status === "Active Lead";
                let isAlarm = false;
                let followText = "No follow-up set";
                
                if (item.followUp) {
                    const fDate = new Date(item.followUp);
                    followText = "Follow up on: " + fDate.toLocaleDateString();
                    if (fDate <= today) isAlarm = true;
                }

                let updatesHtml = "";
                if(item.up1) updatesHtml += `<div class="update-item">${item.up1}</div>`;
                if(item.up2) updatesHtml += `<div class="update-item">${item.up2}</div>`;
                if(item.up3) updatesHtml += `<div class="update-item">${item.up3}</div>`;

                // If not active, grey out the card
                let cardStyle = !isActive ? 'border-left-color: #90a4ae; opacity: 0.85; background: #fafafa;' : '';
                let statusBadge = !isActive 
                    ? `<span style="background:#e0e0e0; color:#424242; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:bold;">Final Status: ${item.status}</span>`
                    : (isAlarm ? `<span class="alarm-badge">🚨 FOLLOW UP DUE!</span>` : `<span class="days-badge">⏳ ${daysText}</span>`);

                listDiv.innerHTML += `
                <div class="lead-card ${isAlarm && isActive ? 'alarm' : ''}" style="${cardStyle}">
                    <div class="card-header">
                        <span>📅 Logged: ${walkInDate.toLocaleDateString()}</span>
                        ${statusBadge}
                    </div>
                    
                    <h3 style="margin:5px 0; color:#1a1a1a; font-size:18px;">
                        ${item.name} 
                        <span style="font-size:14px; color:#666; font-weight:normal;">(${item.phone || 'No Phone'})</span>
                        <span class="salesman-badge">👤 ${item.salesman || 'Unassigned'}</span>
                    </h3>
                    
                    <div style="background:rgba(0,0,0,0.03); padding:10px; border-radius:4px; margin-top:10px; font-size:14px; border:1px solid ${isAlarm && isActive ? '#ef9a9a' : '#e0e0e0'};">
                        <b>Looking for:</b> <span style="color:#00695c; font-weight:bold;">${item.brand}</span><br>
                        <div style="margin-top: 5px; border-top: 1px dashed #ccc; padding-top: 5px; color:#444; white-space: pre-wrap;"><b>Original Note:</b> ${item.notes}</div>
                        ${updatesHtml}
                    </div>
                    
                    ${isActive ? `<div style="margin-top:8px; font-size:12px; font-weight:bold; color:${isAlarm ? '#d32f2f' : '#888'};">
                        ${isAlarm ? `⚠️ THIS CUSTOMER IS DUE FOR A CALL TODAY!` : `📌 ${followText}`}
                    </div>` : ''}

                    ${isActive ? `<button class="btn-close" onclick="openCloseModal('${item.row}', '${item.name.replace(/'/g, "\\'")}')">Update / Close Lead</button>` : ''}
                </div>`;
            });
        }

        function switchTab(tabName) {
            currentActiveTab = tabName;
            renderDashboard();
        }

        function openCloseModal(row, name) {
            targetRowToClose = row;
            document.getElementById('modalLeadName').innerText = "Update: " + name;
            document.getElementById('newLeadNote').value = ""; 
            document.getElementById('closeModal').style.display = 'flex';
        }

        function hideCloseModal() {
            document.getElementById('closeModal').style.display = 'none';
            targetRowToClose = null;
        }

        function submitNote() {
            let noteText = document.getElementById('newLeadNote').value.trim();
            if(!noteText) { alert("Please type an update note first."); return; }
            
            document.getElementById('actionField').value = 'updateLeadNote';
            document.getElementById('rowField').value = targetRowToClose;
            document.getElementById('noteField').value = noteText;
            document.getElementById('resultField').value = ""; 
            document.getElementById('actionForm').submit();

            hideCloseModal();
            document.getElementById('walkinList').innerHTML = '<div class="empty-msg">Saving update...</div>';
            
            setTimeout(loadWalkins, 1500); 
        }

        function submitCloseLead(actionType) {
            let finalStatus = actionType;
            if (actionType === "OTHER") {
                let customReason = prompt("Please type the custom status or reason:");
                if (!customReason || customReason.trim() === "") return; 
                finalStatus = "Other: " + customReason.replace(/['"]/g, ""); 
            }

            document.getElementById('actionField').value = 'closeLead';
            document.getElementById('rowField').value = targetRowToClose;
            document.getElementById('resultField').value = finalStatus;
            document.getElementById('noteField').value = ""; 
            document.getElementById('actionForm').submit();

            hideCloseModal();
            document.getElementById('walkinList').innerHTML = '<div class="empty-msg">Updating database...</div>';

            setTimeout(loadWalkins, 1500); 
        }
    </script>
</body>
</html>
